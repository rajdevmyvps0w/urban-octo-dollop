name: Yasmin

on:
  workflow_dispatch:
  repository_dispatch:

concurrency:
  group: marin-vps
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

env:
  TZ: 'Asia/Kolkata'

jobs:
  ultimate-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 200

    steps:
    - name: рџ“‚ Checkout Code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: рџџў Setup Node.js 22
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: рџҐџ Setup Bun Runtime
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: рџљЂ Storage Reclamation
      run: |
        echo "рџ§№ Targeted Destruction of System Junk..."
        
        # 1. Kill Heavy Pre-installed Frameworks (Android, .NET, Haskell, etc.)
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/.ghcup /usr/share/swift
        
        # 2. Kill Hosted Tool Cache (Yahan sabse zyada space hoti hai)
        sudo rm -rf /opt/hostedtoolcache
        
        # 3. Kill unused heavy languages & browsers
        sudo apt-get purge -y "php*" "ruby*" "go*" "google-cloud*" "azure-cli*" "microsoft-edge*" "google-chrome*" "firefox*" "mono-runtime*" "libmono*" || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        
        # 4. Nuclear Docker Wipe
        sudo docker image prune --all --force
        sudo docker system prune --all --force --volumes
        
        # 5. Clear Library Caches and Manual Bloat
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/lib/node_modules/npm/docs
        sudo rm -rf /usr/local/lib/node_modules/npm/man
        
        # 6. Final Log & Temp Purge
        sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/log/*
        
        echo "вњ… Cleanup Complete! Installing Bot Essentials..."
        
        # Re-install ONLY what's needed for the bot
        sudo apt-get update -qq
        sudo apt-get install -y -qq ffmpeg imagemagick webp jq tmate ttyd btop python3 python3-pip
        
    - name: рџљЂ Expand Virtual RAM (SWAP to 12GB)
      run: |
        echo "вљ™пёЏ Increasing Virtual RAM for Beast Mode..."
        sudo swapoff -a
        sudo fallocate -l 12G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo "вњ… RAM expanded! Current Status:"
        free -h
        
        # --- рџ“Ґ YT-DLP + JS RUNTIME FIX ---
        sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp
        
        # Install Deno
        curl -fsSL https://deno.land/install.sh | sh
        sudo ln -s /home/runner/.deno/bin/deno /usr/local/bin/deno


    - name: рџЌЄ Create Cookies File
      run: |
        echo "${{ secrets.YT_COOKIES }}" > cookies.txt
        # Isse file main root folder mein ban jayegi
        
        # рџ›ЎпёЏ INSTALL & DEEP CLEAN JUNK (Code 2 logic)
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
        # Ye command bot folder ke andar se bhi installer ko uda degi
        find . -name "cloudflared-linux-amd64.deb" -type f -delete
        
        sudo npm install -g pm2
        curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | sudo bash
        ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519

    - name: рџ’ѕ Setup Ghost Auto-Save (savecode)
      run: |
        git config --global user.email "marin-bot@auto.sync"
        git config --global user.name "Marin Auto-Saver"
        git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
        
        echo "**/node_modules/" >> .gitignore
        echo "**/*.log" >> .gitignore
        echo "filebrowser.db" >> .gitignore
        
        mv .github /tmp/.github_hidden
        
        echo '#!/bin/bash' > savecode
        echo 'echo "вЏі Saving ALL BOTS to GitHub..."' >> savecode
        echo 'mv /tmp/.github_hidden ./.github' >> savecode 
        echo 'git add .' >> savecode
        echo 'git commit -m "рџ’ѕ Auto-saved Multi-Bot Empire [skip ci]" || echo "No changes to save."' >> savecode
        echo 'git push origin HEAD || echo "вљ пёЏ Push failed! Check PAT_TOKEN."' >> savecode
        echo 'mv ./.github /tmp/.github_hidden' >> savecode 
        echo 'echo "вњ… Save Process Completed for all bots!"' >> savecode
        
        sudo mv savecode /usr/local/bin/savecode
        sudo chmod +x /usr/local/bin/savecode

    - name: рџ”’ Set SSH Password
      run: |
        echo "runner:${{ secrets.SSH_PASSWORD }}" | sudo chpasswd
        sudo usermod -aG sudo runner

    # --- рџљЂ ADVANCED MULTI-BOT ENGINE ---
    - name: рџљЂ Auto-Detect & Start All Bots (PM2)
      env:
        MONGODB: ${{ secrets.MONGODB }}
        MODS: ${{ secrets.MODS }}
        SESSION_ID: ${{ secrets.SESSION_ID }}
        PACKNAME: ${{ secrets.PACKNAME }}
      run: |
        echo "рџ”Ќ Scanning for Bot Folders..."
        BOT_LIST=""
        
        for dir in */ ; do
          if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
            BOT_NAME=$(basename "$dir")
            
            if [ -z "$BOT_LIST" ]; then
              BOT_LIST="$BOT_NAME"
            else
              BOT_LIST="$BOT_LIST, $BOT_NAME"
            fi
            
            echo "вљ™пёЏ Initializing Bot: $BOT_NAME"
            cd "$dir"
            
            # Use Bun for installation if specified in package.json engines
            if grep -q '"bun":' package.json; then
              echo "рџҐџ Bun detected, installing with Bun..."
              bun install
              
              # Start with smol engine if it is a main.js project
              if [ -f "src/main.js" ]; then
                pm2 start "bun run --smol src/main.js" --name "$BOT_NAME"
              else
                pm2 start "bun start" --name "$BOT_NAME"
              fi
            else
              echo "рџџў Node detected, installing with NPM..."
              npm install
              if [ -f "index.js" ]; then
                pm2 start index.js --name "$BOT_NAME"
              else
                pm2 start npm --name "$BOT_NAME" -- start
              fi
            fi
            cd ..
          fi
        done
        pm2 save
        echo "ACTIVE_BOTS=${BOT_LIST:-'No bots found!'}" >> $GITHUB_ENV

    # --- рџЊђ OPEN WEB PANELS SETUP (Code 2 Stability) ---
    - name: рџЊђ Start Open Web Panels & Btop
      run: |
        set +e 
        
        # рџ›ЎпёЏ ULTRA STABLE STARTUP: No complex hide flags to prevent 502
        # DB is in /tmp so it won't show in your folders
        filebrowser -a 0.0.0.0 -p 8080 -r . --noauth -d /tmp/filebrowser.db > /tmp/filebrowser.log 2>&1 &
        
        ttyd -R -p 61208 btop > /tmp/btop.log 2>&1 &
        
        # Give services enough time to breathe
        sleep 20
        
        cloudflared tunnel --url http://127.0.0.1:8080 > /tmp/cf_file.log 2>&1 &
        cloudflared tunnel --url http://127.0.0.1:61208 > /tmp/cf_btop.log 2>&1 &
        
        # Extra time for tunnel mapping
        sleep 30
        
        FILE_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' /tmp/cf_file.log | head -n 1)
        BTOP_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' /tmp/cf_btop.log | head -n 1)
        
        echo "FILE_MANAGER_URL=${FILE_URL:-'вљ пёЏ Wait & Refresh'}" >> $GITHUB_ENV
        echo "BTOP_URL=${BTOP_URL:-'вљ пёЏ Wait & Refresh'}" >> $GITHUB_ENV

    # --- рџ”„ TMATE SSH & OPEN ALERT ---
    - name: рџ”„ Start Tmate Loop & Discord Alert
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        set +e 
        
        for i in {1..15}; do
           tmate -S /tmp/tmate.sock kill-session 2>/dev/null || true
           tmate -S /tmp/tmate.sock new-session -d
           tmate -S /tmp/tmate.sock wait tmate-ready
           sleep 5
           
           SSH_MSG=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
           
           if [[ "$SSH_MSG" == *"tmate.io"* ]]; then
              
              PAYLOAD=$(jq -n \
                --arg ssh "$SSH_MSG" \
                --arg fileUrl "$FILE_MANAGER_URL" \
                --arg btopUrl "$BTOP_URL" \
                --arg bots "$ACTIVE_BOTS" \
                '{content: "вњЁ**VPS рќђѓрќђљрќђ¬рќђЎрќђ›рќђЁрќђљрќђ«рќђќ**вњЁ\n\nвњ… **рќђ’рќђ­рќђљрќђ­рќђ®рќђ¬:** `Online` рџџў\nрџ¤– **рќђЂрќђњрќђ­рќђўрќђЇрќђћ рќђЃрќђЁрќђ­рќђ¬:** `\($bots)`\n\nрџ“‚ **рќђ…рќђўрќђҐрќђћ рќђЊрќђљрќђ§рќђљрќђ рќђћрќђ«:** \($fileUrl)\nрџ“Љ **рќђ•рќђЏрќђ’ рќђ‡рќђћрќђљрќђҐрќђ­рќђЎ:** \($btopUrl)\nрџ’» **рќђ’рќђ’рќђ‡ рќђ“рќђћрќђ«рќђ¦рќђўрќђ§рќђљрќђҐ:** `\($ssh)`\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ› пёЏ **рќђ•рќђЏрќђ’ рќђЊрќђЂрќђЌрќђЂрќђ†рќђ„рќђЊрќђ„рќђЌрќђ“ рќђ†рќђ”рќђ€рќђѓрќђ„** рџ› пёЏ\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\nрџ’ѕ **рќђ’рќђљрќђЇрќђћ рќђ‚рќђЎрќђљрќђ§рќђ рќђћрќђ¬:** `savecode` \n_(вљ  Required before session ends to save data to GitHub!)_\n\nрџ“¦ **рќђ”рќђ§рќђірќђўрќђ© рќђЃрќђЁрќђ­:** `unzip \"filename.zip\"` \n_(Use this to extract your uploaded bot files)_\n\nрџ—‘пёЏ **рќђ‚lean рќђ‰рќђ®рќђ§рќђ¤:** `rm \"filename.zip\"` \n_(Always delete zip files after unzip to save space)_\n\nрџ“ќ **рќђ•рќђўрќђћрќђ° рќђ‹рќђЁрќђ рќђ¬:** `pm2 logs Name` \n_(Check QR code or bot errors live)_\n\nрџ”„ **рќђ‘рќђћрќђ¬рќђ­рќђљрќђ«рќђ­:** `pm2 restart Name` \n_(Apply new code changes immediately)_\n\nрџ›‘ **рќђ’рќђ­рќђЁрќђ© рќђЃрќђЁрќђ­:** `pm2 stop Name` \n_(To turn off a specific bot)_\n\nрџ“€ **рќђ’рќђ­рќђљрќђ­рќђ®рќђ¬:** `pm2 status` \n_(To see all running bots list)_\n\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nвњЁ **рџ’Ў рќђ“рќђўрќђ©:** _If  You Have Any Issue Connect With Owner https://wa.me/918434573266 !_ "}')
              
              curl -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK
              
              echo "RESTART_SAFE=true" >> $GITHUB_ENV
              
              for m in {1..36}; do sleep 300; done
              
              savecode || true
              exit 0
           fi
           sleep 5
        done
        
        curl -H "Content-Type: application/json" -d '{"content": "вќЊ **ERROR:** Tmate Server failed. Auto-restart paused."}' $DISCORD_WEBHOOK
        exit 1

    - name: рџ§џ Respawn Zombie
      if: env.RESTART_SAFE == 'true'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.PAT_TOKEN }}
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'marin.yml',
            ref: 'main'
          })
